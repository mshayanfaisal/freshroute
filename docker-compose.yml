#this is the docker compose file
services:
  db:
    image: postgres:15-alpine
    container_name: freshroute-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freshroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshroute_pw}
      POSTGRES_DB: ${POSTGRES_DB:-freshroute}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freshroute}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: freshroute-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-freshroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshroute_pw}
      POSTGRES_DB: ${POSTGRES_DB:-freshroute}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1024}
      AI_ENABLED: ${AI_ENABLED:-true}
      BACKEND_PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      NODE_ENV: production
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
    ports:
      - "${BACKEND_PORT:-3000}:3000"

volumes:
  postgres-data:
